<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Cursor Glow Effect</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: #0f172a;
            overflow: hidden;
        }

        .glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 9999px;
            pointer-events: none;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.5), transparent 60%);
            filter: blur(60px);
            transform: translate(-50%, -50%);
        }
    </style>
</head>

<body class="h-screen w-screen flex items-center justify-center text-white">

    <h1 class="text-4xl font-bold z-10">Cursor Glow</h1>

    <div id="glow" class="glow"></div>

    <script>
        const glow = document.getElementById("glow");

        let mouseX = 0;
        let mouseY = 0;

        let currentX = 0;
        let currentY = 0;

        const speed = 0.08; // lower = smoother / slower

        window.addEventListener("mousemove", (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animate() {
            // LERP (linear interpolation)
            currentX += (mouseX - currentX) * speed;
            currentY += (mouseY - currentY) * speed;

            glow.style.left = currentX + "px";
            glow.style.top = currentY + "px";

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>

</html>
